[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy     = "microphone=*, camera=*, display-capture=*, fullscreen=*"
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control          = "no-cache, no-store, must-revalidate"
